name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    environment:
      name: github-pages

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install depedencies
        run: composer require nuzkito/pluma:0.2.0 --prefer-dist --no-interaction

      - name: Generate the site
        env:
          SITE_URL: https://recetas.nuzkito.es
        run: ./vendor/bin/pluma generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
